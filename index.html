<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамический GUI-Движок с Решателем</title>
    <link rel="stylesheet" href="./css.css">
</head>
<body>
    <div id="app">
        <div class="layout-wrapper">
            <!-- Новая боковая панель для навигации -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <h3>📋 Навигация</h3>
                </div>
                <div id="quickNav" class="sidebar-nav">
                    <!-- Здесь будут вкладки -->
                </div>
                <div class="sidebar-stats">
                    <div class="stat-item">
                        <span class="stat-label">GUI файл:</span>
                        <span id="guiStatus" class="stat-value">❌</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">База знаний:</span>
                        <span id="kbStatus" class="stat-value">❌</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">История болезни:</span>
                        <span id="historyStatus" class="stat-value">❌</span>
                    </div>
                </div>
            </div>
            
            <!-- Основной контент -->
            <div class="main-content">
                <h1>Панель клинического консультирования</h1>
                
                <div class="action-buttons">
                    <label for="guiFileInput" class="file-input-label">
                        📋 Выберите Описание GUI
                        <input type="file" id="guiFileInput" accept=".json" style="display: none;" />
                    </label>
                    <label for="knowledgeBaseFile" class="file-input-label">
                        📁 Загрузить базу знаний
                        <input type="file" id="knowledgeBaseFile" accept=".json" style="display: none;" />
                    </label>
                    <label for="patientHistoryFile" class="file-input-label">
                        📋 Загрузить историю болезни
                        <input type="file" id="patientHistoryFile" accept=".json" style="display: none;" />
                    </label>
                    <button id="analyzeButton">🔍 Анализировать данные</button>
                </div>
                
                <div id="tabs">
                    <div class="tab-headers"></div>
                    <div class="tab-contents"></div>
                </div>
                
                <div id="results" style="display: none; margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 5px; border: 1px solid #ddd;">
                    <h3>Результаты анализа:</h3>
                    <div id="analysisResults"></div>
                </div>
                
                <div class="action-buttons">
                    <button id="saveButton">💾 Сохранить данные</button>
                    <button id="clearButton">🗑 Очистить форму</button>
                    <button id="reloadButton">🔄 Загрузить заново</button>
                    <button id="aiRecommendationsButton" class="btn" style="background: #667eea; color: white;">
                        🤖 Получить AI-рекомендации
                    </button>
                    
                    <div id="aiLoading" style="display: none; text-align: center; margin: 10px 0; padding: 10px; background: #e3f2fd; border-radius: 5px;">
                        <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                            <div class="spinner" style="width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #2196F3; border-radius: 50%; animation: spin 1s linear infinite;"></div>
                            <span style="color: #2196F3; font-weight: bold;">🤖 AI генерирует рекомендации... Подождите</span>
                        </div>
                    </div>
                </div>
                
                <div id="notification" style="color: green; margin-top: 10px;"></div>
            </div>
        </div>
    </div>
    
    <script src="./js/gui-engine.js"></script>
    <script src="./js/solver.js"></script>
    <script src="./js/sidebar.js"></script>
</body>
</html>
